short_bio: >-
  <p>
    I am an undergraduate student in the Honor Class of Artificial Intelligence
    (Data Science Track) at Fudan University. My research interests lie at the
    intersection of embodied AI and multimodal intelligence, with a focus on
    robot learning, 3D vision, and interpretable evaluation of generative models.
  </p>

  <p>
    I am currently a research intern at the Multimedia Laboratory of
    The Chinese University of Hong Kong, advised by
    <a href="https://tianfan.info/" target="_blank" rel="noopener noreferrer">Prof. Tianfan Xue</a>.
    My current research focuses on fine-grained and evidence-aware evaluation
    of text-to-image generation. Previously, I conducted research at the
    Shanghai Qi Zhi Institute under the supervision of Prof. Huazhe Xu, where
    I worked on generalizable robotic manipulation and contributed to
    AffordGen.
  </p>

