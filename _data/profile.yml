short_bio: >-
  <p>
    I am an undergraduate student in the Honor Class of Artificial Intelligence
    (Data Science Track) at Fudan University. My research interests include
    embodied AI, robot learning, 3D vision, multimodal reasoning, and interpretable
    evaluation of generative models.
  </p>

  <p>
    I am currently working with
    <a href="https://tianfan.info/" target="_blank" rel="noopener noreferrer">Prof. Tianfan Xue</a>
    at the Multimedia Laboratory of The Chinese University of Hong Kong on
    fine-grained and evidence-aware evaluation of text-to-image generation.
    Previously, I worked with
    <a href="https://hxu.rocks/" target="_blank" rel="noopener noreferrer">Prof. Huazhe Xu</a>
    at the Shanghai Qi Zhi Institute on generalizable robotic manipulation,
    and with Prof. Deqing Yang at Fudan University on computer-using agents.
  </p>

